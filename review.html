<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご来店アンケート</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #F8F7F4;
      color: #2D2D2D;
      padding: 24px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #1A1A2E;
    }

    .subtitle {
      font-size: 14px;
      color: #6B7B8D;
      margin-bottom: 32px;
      line-height: 1.8;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #1A1A2E;
    }

    .required {
      color: #E05C5C;
      margin-left: 4px;
    }

    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      gap: 8px;
    }

    .star-rating input {
      display: none;
    }

    .star-rating label {
      font-size: 36px;
      color: #ccc;
      cursor: pointer;
      font-weight: normal;
    }

    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: #E8B86D;
    }

    .checkbox-group, .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-group label, .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      font-size: 14px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .checkbox-group label:has(input:checked),
    .radio-group label:has(input:checked) {
      border-color: #E8B86D;
      background: #FDF6E9;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.8;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #E8B86D;
    }

    .hint {
      font-size: 12px;
      color: #6B7B8D;
      margin-top: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #1A1A2E;
      color: #E8B86D;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .submit-btn:hover {
      opacity: 0.85;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 32px;
      font-size: 14px;
      color: #6B7B8D;
    }

    .result-area {
      display: none;
      background: #fff;
      border: 1px solid #E8B86D;
      border-radius: 12px;
      padding: 24px;
      margin-top: 24px;
    }

    .result-title {
      font-size: 16px;
      font-weight: bold;
      color: #1A1A2E;
      margin-bottom: 16px;
    }

    .review-text {
      font-size: 15px;
      line-height: 1.8;
      color: #2D2D2D;
      background: #F8F7F4;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .copy-btn {
      width: 100%;
      padding: 14px;
      background: #E8B86D;
      color: #1A1A2E;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .copy-btn:hover {
      opacity: 0.85;
    }

    .map-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #1A1A2E;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .map-btn:hover {
      opacity: 0.85;
    }

    .copy-success {
      display: none;
      text-align: center;
      font-size: 13px;
      color: #06C755;
      margin-top: 8px;
    }

    .feedback-area {
      display: none;
      text-align: center;
      padding: 32px;
      background: #fff;
      border-radius: 12px;
      margin-top: 24px;
    }

    .feedback-area h2 {
      font-size: 18px;
      color: #1A1A2E;
      margin-bottom: 12px;
    }

    .feedback-area p {
      font-size: 14px;
      color: #6B7B8D;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ご来店アンケート</h1>
    <p class="subtitle">本日はご来店いただきありがとうございました。<br>所要時間は約1分です。ぜひご回答をお願いいたします。</p>

    <form id="reviewForm">

      <div class="form-group">
        <label>総合評価<span class="required">*</span></label>
        <div class="star-rating">
          <input type="radio" name="rating" id="star5" value="5" required>
          <label for="star5">★</label>
          <input type="radio" name="rating" id="star4" value="4">
          <label for="star4">★</label>
          <input type="radio" name="rating" id="star3" value="3">
          <label for="star3">★</label>
          <input type="radio" name="rating" id="star2" value="2">
          <label for="star2">★</label>
          <input type="radio" name="rating" id="star1" value="1">
          <label for="star1">★</label>
        </div>
      </div>

      <div class="form-group">
        <label>ご来店のきっかけ<span class="required">*</span></label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="trigger" value="Googleマップ"><span>Googleマップ</span></label>
          <label><input type="checkbox" name="trigger" value="Instagram"><span>Instagram</span></label>
          <label><input type="checkbox" name="trigger" value="友人・知人の紹介"><span>友人・知人の紹介</span></label>
          <label><input type="checkbox" name="trigger" value="チラシ"><span>チラシ</span></label>
          <label><input type="checkbox" name="trigger" value="その他"><span>その他</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>特に良かった点<span class="required">*</span></label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="goodPoints" value="スタッフの対応"><span>スタッフの対応</span></label>
          <label><input type="checkbox" name="goodPoints" value="施術・料理・サービスの質"><span>施術・料理・サービスの質</span></label>
          <label><input type="checkbox" name="goodPoints" value="清潔感"><span>清潔感</span></label>
          <label><input type="checkbox" name="goodPoints" value="立地・アクセス"><span>立地・アクセス</span></label>
          <label><input type="checkbox" name="goodPoints" value="価格"><span>価格</span></label>
          <label><input type="checkbox" name="goodPoints" value="待ち時間"><span>待ち時間</span></label>
        </div>
      </div>

      <div class="form-group">
        <label>ご来店の感想<span class="required">*</span></label>
        <textarea name="comment" placeholder="どんな短い内容でも大丈夫です。率直なご意見をお聞かせください。" required></textarea>
        <p class="hint">例：スタッフの方がとても丁寧で、また来たいと思いました。</p>
      </div>

      <div class="form-group">
        <label>また来店したいと思いますか？<span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="revisit" value="はい" required><span>はい</span></label>
          <label><input type="radio" name="revisit" value="たぶん"><span>たぶん</span></label>
          <label><input type="radio" name="revisit" value="まだわからない"><span>まだわからない</span></label>
        </div>
      </div>

      <button type="submit" class="submit-btn">送信する</button>
    </form>

    <div class="loading" id="loading">
      口コミ文章を作成中です。少々お待ちください...
    </div>

    <div class="result-area" id="resultArea">
      <p class="result-title">✅ 口コミ文章が完成しました</p>
      <div class="review-text" id="reviewText"></div>
      <button class="copy-btn" onclick="copyText()">📋 文章をコピーする</button>
      <p class="copy-success" id="copySuccess">コピーしました！</p>
      <a class="map-btn" id="mapBtn" href="#" target="_blank">
        Googleマップに投稿する →
      </a>
      <p class="hint" style="margin-top:12px; text-align:center;">コピーした文章をそのまま貼り付けてください。編集も自由です。</p>
    </div>

    <div class="feedback-area" id="feedbackArea">
      <h2>ご意見ありがとうございました。</h2>
      <p>いただいたご意見はサービス向上に大切に活用させていただきます。</p>
    </div>

  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/a/macros/bh-marketing.com/s/AKfycbz6M8cR97Jjv7-dshdSEqPugwqBjquhbZMoD4dne2UbpCEaAuR_TFs292gAp4_8N5J-/exec';
    const REVIEW_URL = 'https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID'; // Place IDが取得できたら差し替え

    document.getElementById('mapBtn').href = REVIEW_URL;

    document.getElementById('reviewForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const rating = parseInt(document.querySelector('input[name="rating"]:checked')?.value);
      if (!rating) { alert('総合評価を選択してください'); return; }

      const triggers = [...document.querySelectorAll('input[name="trigger"]:checked')].map(el => el.value);
      if (triggers.length === 0) { alert('来店のきっかけを選択してください'); return; }

      const goodPoints = [...document.querySelectorAll('input[name="goodPoints"]:checked')].map(el => el.value);
      if (goodPoints.length === 0) { alert('良かった点を選択してください'); return; }

      const comment = document.querySelector('textarea[name="comment"]').value;
      if (!comment) { alert('感想を入力してください'); return; }

      const revisit = document.querySelector('input[name="revisit"]:checked')?.value;
      if (!revisit) { alert('再来店意向を選択してください'); return; }

      document.getElementById('reviewForm').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({
            rating,
            trigger: triggers.join('・'),
            goodPoints: goodPoints.join('・'),
            comment,
            revisit
          })
        });

        const data = await response.json();
        document.getElementById('loading').style.display = 'none';

        if (data.type === 'review') {
          document.getElementById('reviewText').textContent = data.text;
          document.getElementById('resultArea').style.display = 'block';
        } else {
          document.getElementById('feedbackArea').style.display = 'block';
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('reviewForm').style.display = 'block';
        alert('エラーが発生しました。もう一度お試しください。');
      }
    });

    function copyText() {
      const text = document.getElementById('reviewText').textContent;
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copySuccess').style.display = 'block';
        setTimeout(() => {
          document.getElementById('copySuccess').style.display = 'none';
        }, 2000);
      });
    }
  </script>
</body>
</html>
